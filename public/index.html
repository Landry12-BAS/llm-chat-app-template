<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cloudflare AI Chat</title>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
			id="hljs-theme"
		/>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<style>
			:root[data-theme="dark"] {
				--bg-primary: #0f0f0f;
				--bg-secondary: #141414;
				--bg-tertiary: #1e1e1e;
				--bg-hover: #2a2a2a;
				--border: #2a2a2a;
				--text-primary: #e5e5e5;
				--text-secondary: #9ca3af;
				--text-muted: #6b7280;
				--accent: #f6821f;
				--accent-hover: #e07518;
				--user-bubble: #1a2235;
				--user-bubble-border: #253a5e;
				--assistant-bubble: #161616;
				--assistant-bubble-border: #2a2a2a;
				--input-bg: #141414;
				--code-bg: #0d1117;
				--scrollbar: #2a2a2a;
			}
			:root[data-theme="light"] {
				--bg-primary: #ffffff;
				--bg-secondary: #f9fafb;
				--bg-tertiary: #f3f4f6;
				--bg-hover: #e5e7eb;
				--border: #e5e7eb;
				--text-primary: #111827;
				--text-secondary: #4b5563;
				--text-muted: #9ca3af;
				--accent: #f6821f;
				--accent-hover: #e07518;
				--user-bubble: #fff4eb;
				--user-bubble-border: #fcd9b5;
				--assistant-bubble: #f9fafb;
				--assistant-bubble-border: #e5e7eb;
				--input-bg: #ffffff;
				--code-bg: #f6f8fa;
				--scrollbar: #d1d5db;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			::-webkit-scrollbar { width: 5px; }
			::-webkit-scrollbar-track { background: transparent; }
			::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				background: var(--bg-primary);
				color: var(--text-primary);
				height: 100vh;
				display: flex;
				overflow: hidden;
				transition: background 0.2s, color 0.2s;
			}

			/* Sidebar overlay */
			.sidebar-overlay {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0,0,0,0.5);
				z-index: 99;
			}
			.sidebar-overlay.visible { display: block; }

			/* Sidebar */
			.sidebar {
				width: 260px;
				min-width: 260px;
				background: var(--bg-secondary);
				border-right: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				transition: transform 0.25s ease;
				z-index: 100;
			}

			.sidebar-header {
				padding: 1rem;
				border-bottom: 1px solid var(--border);
				display: flex;
				align-items: center;
				gap: 0.6rem;
			}
			.sidebar-logo { width: 26px; height: 26px; flex-shrink: 0; }
			.sidebar-brand { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
			.sidebar-brand span { color: var(--accent); }

			.new-chat-btn {
				margin: 0.75rem;
				padding: 0.6rem 1rem;
				background: var(--accent);
				color: white;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				font-size: 0.875rem;
				font-weight: 600;
				display: flex;
				align-items: center;
				gap: 0.5rem;
				justify-content: center;
				transition: background 0.15s, transform 0.1s;
			}
			.new-chat-btn:hover { background: var(--accent-hover); }
			.new-chat-btn:active { transform: scale(0.98); }

			.conversations-label {
				padding: 0.5rem 1rem 0.25rem;
				font-size: 0.7rem;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.08em;
				color: var(--text-muted);
			}

			.conversations-list {
				flex: 1;
				overflow-y: auto;
				padding: 0 0.5rem 0.5rem;
			}

			.conversation-item {
				padding: 0.55rem 0.75rem;
				border-radius: 7px;
				cursor: pointer;
				display: flex;
				align-items: center;
				gap: 0.5rem;
				transition: background 0.12s;
				user-select: none;
			}
			.conversation-item:hover { background: var(--bg-hover); color: var(--text-primary); }
			.conversation-item.active { background: var(--bg-tertiary); color: var(--text-primary); }
			.conversation-item .conv-title {
				flex: 1;
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
				font-size: 0.83rem;
				color: var(--text-secondary);
			}
			.conversation-item.active .conv-title,
			.conversation-item:hover .conv-title { color: var(--text-primary); }
			.conv-delete {
				opacity: 0;
				background: none;
				border: none;
				color: var(--text-muted);
				cursor: pointer;
				font-size: 1.1rem;
				line-height: 1;
				padding: 2px 4px;
				border-radius: 4px;
				flex-shrink: 0;
				transition: color 0.12s;
			}
			.conversation-item:hover .conv-delete { opacity: 1; }
			.conv-delete:hover { color: #ef4444; }

			.sidebar-footer {
				padding: 0.75rem 1rem;
				border-top: 1px solid var(--border);
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			.model-badge { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; color: var(--text-muted); }
			.model-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; flex-shrink: 0; }
			.theme-toggle {
				background: var(--bg-tertiary);
				border: 1px solid var(--border);
				color: var(--text-secondary);
				border-radius: 7px;
				padding: 0.35rem 0.55rem;
				cursor: pointer;
				font-size: 0.9rem;
				line-height: 1;
				transition: background 0.12s;
			}
			.theme-toggle:hover { background: var(--bg-hover); }

			/* Main */
			.main {
				flex: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
				background: var(--bg-primary);
				position: relative;
			}

			.main-header {
				padding: 0.75rem 1.25rem;
				border-bottom: 1px solid var(--border);
				display: flex;
				align-items: center;
				gap: 0.75rem;
				background: var(--bg-primary);
				min-height: 56px;
			}
			.sidebar-toggle {
				display: none;
				background: none;
				border: none;
				color: var(--text-secondary);
				cursor: pointer;
				padding: 0.3rem;
				border-radius: 6px;
				transition: background 0.12s;
				align-items: center;
			}
			.sidebar-toggle:hover { background: var(--bg-tertiary); }
			.main-title {
				flex: 1;
				font-size: 0.9rem;
				font-weight: 500;
				color: var(--text-primary);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.clear-btn {
				background: none;
				border: 1px solid var(--border);
				color: var(--text-muted);
				border-radius: 6px;
				padding: 0.3rem 0.7rem;
				font-size: 0.78rem;
				cursor: pointer;
				transition: all 0.15s;
				white-space: nowrap;
			}
			.clear-btn:hover { border-color: #ef4444; color: #ef4444; }

			/* Messages */
			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.5rem 1.25rem;
				display: flex;
				flex-direction: column;
				gap: 1.25rem;
			}

			.message-wrapper {
				display: flex;
				gap: 0.75rem;
				max-width: 780px;
				width: 100%;
				align-items: flex-start;
			}
			.message-wrapper.user { margin-left: auto; flex-direction: row-reverse; }

			.avatar {
				width: 30px;
				height: 30px;
				border-radius: 7px;
				flex-shrink: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 0.8rem;
				font-weight: 700;
				margin-top: 2px;
			}
			.user-avatar { background: var(--accent); color: white; }
			.assistant-avatar { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }

			.message-content {
				min-width: 0;
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 0.25rem;
			}
			.message-wrapper.user .message-content { align-items: flex-end; }

			.message-bubble {
				padding: 0.7rem 1rem;
				border-radius: 12px;
				font-size: 0.9rem;
				line-height: 1.7;
				max-width: 100%;
			}
			.user .message-bubble {
				background: var(--user-bubble);
				border: 1px solid var(--user-bubble-border);
				border-radius: 12px 4px 12px 12px;
			}
			.assistant .message-bubble {
				background: var(--assistant-bubble);
				border: 1px solid var(--assistant-bubble-border);
				border-radius: 4px 12px 12px 12px;
			}

			/* Markdown styles */
			.message-bubble p { margin: 0 0 0.65rem; }
			.message-bubble p:last-child { margin-bottom: 0; }
			.message-bubble ul, .message-bubble ol { padding-left: 1.4rem; margin: 0.4rem 0; }
			.message-bubble li { margin: 0.2rem 0; }
			.message-bubble h1, .message-bubble h2, .message-bubble h3, .message-bubble h4 { margin: 0.8rem 0 0.4rem; font-weight: 600; line-height: 1.4; }
			.message-bubble h1 { font-size: 1.15rem; }
			.message-bubble h2 { font-size: 1.05rem; }
			.message-bubble h3 { font-size: 0.95rem; }
			.message-bubble a { color: var(--accent); text-decoration: none; }
			.message-bubble a:hover { text-decoration: underline; }
			.message-bubble blockquote { border-left: 3px solid var(--accent); padding: 0.2rem 0 0.2rem 0.75rem; color: var(--text-secondary); margin: 0.5rem 0; font-style: italic; }
			.message-bubble strong { font-weight: 600; }
			.message-bubble hr { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }
			.message-bubble table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.85rem; }
			.message-bubble th, .message-bubble td { padding: 0.45rem 0.75rem; border: 1px solid var(--border); text-align: left; }
			.message-bubble th { background: var(--bg-tertiary); font-weight: 600; }

			/* Inline code */
			.message-bubble code:not(pre code) {
				background: var(--bg-tertiary);
				border: 1px solid var(--border);
				padding: 0.1rem 0.35rem;
				border-radius: 4px;
				font-size: 0.83em;
				font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
			}

			/* Code blocks */
			.code-block-wrapper {
				position: relative;
				margin: 0.6rem 0;
				border-radius: 9px;
				overflow: hidden;
				border: 1px solid var(--border);
			}
			.code-block-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0.35rem 0.75rem;
				background: var(--bg-tertiary);
				border-bottom: 1px solid var(--border);
			}
			.code-lang { font-size: 0.72rem; color: var(--text-muted); font-family: "SF Mono", monospace; }
			.copy-btn {
				background: none;
				border: 1px solid transparent;
				color: var(--text-muted);
				cursor: pointer;
				font-size: 0.72rem;
				padding: 0.2rem 0.55rem;
				border-radius: 5px;
				transition: all 0.15s;
				display: flex;
				align-items: center;
				gap: 0.3rem;
				font-family: inherit;
			}
			.copy-btn:hover { background: var(--bg-hover); border-color: var(--border); color: var(--text-primary); }
			.copy-btn.copied { color: #10b981; }
			.code-block-wrapper pre { margin: 0; padding: 1rem; overflow-x: auto; background: var(--code-bg) !important; }
			.code-block-wrapper pre code { background: none !important; padding: 0 !important; font-size: 0.84rem; font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; line-height: 1.65; border: none !important; }

			.message-meta { font-size: 0.68rem; color: var(--text-muted); padding: 0 0.2rem; }

			/* Stream cursor */
			.stream-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 1px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
			@keyframes blink { 50% { opacity: 0; } }

			/* Typing indicator */
			.typing-wrapper {
				display: none;
				gap: 0.75rem;
				max-width: 780px;
				align-items: flex-start;
				padding: 0 1.25rem;
			}
			.typing-wrapper.visible { display: flex; }
			.typing-bubble {
				padding: 0.7rem 1rem;
				background: var(--assistant-bubble);
				border: 1px solid var(--assistant-bubble-border);
				border-radius: 4px 12px 12px 12px;
				display: flex;
				gap: 0.4rem;
				align-items: center;
			}
			.dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.3s ease-in-out infinite; }
			.dot:nth-child(2) { animation-delay: 0.18s; }
			.dot:nth-child(3) { animation-delay: 0.36s; }
			@keyframes bounce {
				0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
				30% { transform: translateY(-5px); opacity: 1; }
			}

			/* Scroll to bottom */
			.scroll-bottom-btn {
				position: absolute;
				bottom: 110px;
				right: 1.25rem;
				width: 34px;
				height: 34px;
				background: var(--bg-tertiary);
				border: 1px solid var(--border);
				border-radius: 50%;
				color: var(--text-secondary);
				cursor: pointer;
				display: none;
				align-items: center;
				justify-content: center;
				transition: all 0.15s;
				z-index: 10;
				box-shadow: 0 2px 8px rgba(0,0,0,0.15);
			}
			.scroll-bottom-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
			.scroll-bottom-btn.visible { display: flex; }

			/* Empty state */
			.empty-state {
				flex: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 0.75rem;
				padding: 2rem;
				text-align: center;
			}
			.empty-icon {
				width: 52px;
				height: 52px;
				background: var(--bg-tertiary);
				border: 1px solid var(--border);
				border-radius: 14px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 1.5rem;
				margin-bottom: 0.25rem;
			}
			.empty-state h2 { font-size: 1.15rem; font-weight: 600; color: var(--text-primary); }
			.empty-state p { font-size: 0.85rem; color: var(--text-secondary); max-width: 340px; line-height: 1.6; }
			.chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 0.5rem; }
			.chip {
				padding: 0.45rem 0.9rem;
				border: 1px solid var(--border);
				border-radius: 9999px;
				font-size: 0.8rem;
				color: var(--text-secondary);
				background: var(--bg-secondary);
				cursor: pointer;
				transition: all 0.15s;
				white-space: nowrap;
			}
			.chip:hover { border-color: var(--accent); color: var(--accent); background: var(--bg-tertiary); }

			/* Input area */
			.input-area { padding: 0.75rem 1.25rem 1rem; background: var(--bg-primary); }
			.input-wrapper {
				display: flex;
				align-items: flex-end;
				gap: 0.6rem;
				background: var(--input-bg);
				border: 1.5px solid var(--border);
				border-radius: 12px;
				padding: 0.5rem 0.5rem 0.5rem 1rem;
				transition: border-color 0.18s;
				max-width: 780px;
				margin: 0 auto;
			}
			.input-wrapper:focus-within { border-color: var(--accent); }
			#user-input {
				flex: 1;
				background: none;
				border: none;
				outline: none;
				color: var(--text-primary);
				font-family: inherit;
				font-size: 0.9rem;
				line-height: 1.6;
				resize: none;
				max-height: 180px;
				min-height: 24px;
				padding: 0.2rem 0;
			}
			#user-input::placeholder { color: var(--text-muted); }
			#send-button {
				width: 34px;
				height: 34px;
				background: var(--accent);
				color: white;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
				transition: background 0.15s, opacity 0.15s, transform 0.1s;
			}
			#send-button:hover { background: var(--accent-hover); }
			#send-button:active { transform: scale(0.93); }
			#send-button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
			.input-hint {
				text-align: center;
				font-size: 0.7rem;
				color: var(--text-muted);
				margin-top: 0.5rem;
				max-width: 780px;
				margin-left: auto;
				margin-right: auto;
			}

			/* Responsive */
			@media (max-width: 768px) {
				.sidebar { position: fixed; top: 0; left: 0; height: 100vh; transform: translateX(-100%); }
				.sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
				.sidebar-overlay.visible { display: block; }
				.sidebar-toggle { display: flex; }
				.chat-messages { padding: 1rem; }
				.typing-wrapper { padding: 0 1rem; }
				.input-area { padding: 0.6rem 1rem 0.75rem; }
			}
		</style>
	</head>
	<body>
		<div class="sidebar-overlay"></div>

		<aside class="sidebar">
			<div class="sidebar-header">
				<svg class="sidebar-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M67.5 58.3c1.5-6.8-0.3-12.3-4.6-16.6-3.9-3.9-9.3-5.9-15.4-5.4l-1.1 0.1-0.7-0.9c-2.8-3.6-7.1-5.8-11.8-5.8-8.4 0-15.2 6.8-15.2 15.2 0 0.8 0.1 1.6 0.2 2.4l0.2 1.2-1.1 0.5C13.5 51.5 10 56.1 10 61.7c0 7.1 5.7 12.8 12.8 12.8h42.8c5.8 0 10.5-4.7 10.5-10.5 0-2.3-0.7-4.4-2-6.1l-0.8-0.9 0.5-1.2c-2.1 0.5-4.3 0.8-6.3 2.5z" fill="#f6821f"/>
					<path d="M75.2 45.8c-0.3 0-0.6 0-0.9 0-0.4-5.2-2.8-9.9-6.5-13.3-4.1-3.7-9.5-5.7-15.1-5.3-3.5 0.3-6.8 1.5-9.6 3.4 3.2-1.2 6.7-1.8 10.2-1.5 5.6 0.4 10.8 2.7 14.7 6.5 3.5 3.4 5.7 7.9 6.1 12.7" fill="#fbad41"/>
				</svg>
				<span class="sidebar-brand">CF <span>AI Chat</span></span>
			</div>

			<button class="new-chat-btn" id="new-chat-btn">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
					<line x1="12" y1="5" x2="12" y2="19"/>
					<line x1="5" y1="12" x2="19" y2="12"/>
				</svg>
				New Chat
			</button>

			<div class="conversations-label">Recent</div>
			<div class="conversations-list" id="conversations-list"></div>

			<div class="sidebar-footer">
				<div class="model-badge">
					<div class="model-dot"></div>
					Llama 3.1 8B
				</div>
				<button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
			</div>
		</aside>

		<main class="main">
			<div class="main-header">
				<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
					<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<line x1="3" y1="6" x2="21" y2="6"/>
						<line x1="3" y1="12" x2="21" y2="12"/>
						<line x1="3" y1="18" x2="21" y2="18"/>
					</svg>
				</button>
				<span class="main-title" id="main-title">New Chat</span>
				<button class="clear-btn" id="clear-btn">Clear chat</button>
			</div>

			<div class="chat-messages" id="chat-messages"></div>

			<div class="typing-wrapper" id="typing-wrapper">
				<div class="avatar assistant-avatar">⚡</div>
				<div class="typing-bubble">
					<div class="dot"></div>
					<div class="dot"></div>
					<div class="dot"></div>
				</div>
			</div>

			<button class="scroll-bottom-btn" id="scroll-bottom-btn" aria-label="Scroll to bottom">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
					<polyline points="6 9 12 15 18 9"/>
				</svg>
			</button>

			<div class="input-area">
				<div class="input-wrapper">
					<textarea id="user-input" placeholder="Message AI…" rows="1" autofocus></textarea>
					<button id="send-button" aria-label="Send">
						<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
							<line x1="22" y1="2" x2="11" y2="13"/>
							<polygon points="22 2 15 22 11 13 2 9 22 2"/>
						</svg>
					</button>
				</div>
				<p class="input-hint">Enter to send &middot; Shift+Enter for newline</p>
			</div>
		</main>

		<script src="chat.js"></script>
	</body>
</html>
